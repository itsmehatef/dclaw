name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: vet
        run: go vet ./...
      - name: build
        run: make build
      - name: test
        run: go test ./...
      - name: cli smoke
        run: ./scripts/smoke-cli.sh
      - name: tui smoke
        run: ./scripts/smoke-tui.sh

  docker-smoke:
    # Integration with real docker. Runs on main pushes and tag pushes — PRs
    # are skipped because dind is too slow for the inner loop. Both the
    # beta.1 and beta.2 hotfix cascades surfaced bugs that would have been
    # caught earlier had docker-smoke fired on every main push instead of
    # only on tag pushes.
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    services:
      docker:
        image: docker:26-dind
        options: --privileged
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: build
        run: make build
      - name: build agent image
        run: bash agent/build.sh
      - name: daemon smoke
        run: ./scripts/smoke-daemon.sh
