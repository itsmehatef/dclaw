# dclaw fleet configuration — example
# fleet.yaml format is aspirational — the daemon (shipped in v0.3.0-beta.2.6)
# does not yet read it. CLI-driven `dclaw agent create` is the real surface today.

version: 1

main_agent:
  name: "main"
  # The agent container image. dclaw-agent:v0.1 is built by agent/Dockerfile
  # and runs pi-mono (@mariozechner/pi-coding-agent) headlessly inside a sandbox.
  image: "dclaw-agent:v0.1"
  # Host directory bind-mounted as the agent's workspace (read/write).
  workspace: "./workspace"
  # Channel plugins the main agent talks to. Each is an independently
  # versioned container. Not yet wired through the daemon as of beta.2.6.
  channels:
    - plugin: "discord"
      version: "1.0.0"
  # Outbound network allowlist — declared on the wire protocol but not yet enforced.
  egress_allowlist:
    - "api.anthropic.com"
    - "api.github.com"
    - "registry.npmjs.org"

workers:
  # Maximum concurrent worker agents the main agent may have running.
  max_concurrent: 5
  # Hard cost ceiling per session — dispatcher refuses to spawn new workers
  # once cumulative API spend crosses this threshold.
  max_cost_per_session_usd: 10.00
  # If a worker runs longer than this, the dispatcher kills it.
  default_timeout_seconds: 3600
  # Base image for spawned worker agents. Same as main_agent unless overridden.
  base_image: "dclaw-agent:v0.1"
  # Default egress allowlist for workers. Can be tightened per-task when
  # calling worker.spawn (scoped network policy).
  egress_allowlist:
    - "api.anthropic.com"
